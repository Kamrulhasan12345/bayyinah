version: '3.9'

name: bayyinah

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayyinah-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
        - ./.env.prod
    environment:
        SPRING_CONFIG_IMPORT: optional:file:/run/config/.env[.properties]
    volumes:
      - ./.env.prod:/run/config/.env:ro


